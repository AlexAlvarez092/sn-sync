name: Feature request
description: Suggest an enhancement for sn-sync.
title: "feature: "
labels:
  - type: feature
  - status: needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature.

        Good feature requests describe:
        - the problem to solve,
        - the proposed behavior,
        - alternatives considered,
        - and impact on current users.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What pain point are you trying to solve?
      placeholder: I cannot easily ...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior/API/UI you want.
      placeholder: Add a new command that ...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you evaluated.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Auth
        - Pull
        - Push
        - Report
        - Index
        - Config
        - Documentation
        - CI / tooling
        - Other
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope and impact
      description: Backward compatibility, migration needs, expected users.

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Mockups, examples, references, related issues.
