name: Bug report
description: Report a reproducible problem in sn-sync.
title: "bug: "
labels:
  - type: bug
  - status: needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug.

        Before submitting:
        - Confirm you are on the latest version.
        - Search existing issues to avoid duplicates.
        - Include reproducible steps and logs.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Short and clear description of the bug.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide exact steps so maintainers can reproduce.
      placeholder: |
        1. Run command ...
        2. Open file ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What happened instead?
    validations:
      required: true

  - type: input
    id: extension_version
    attributes:
      label: sn-sync version
      placeholder: 0.0.1
    validations:
      required: true

  - type: input
    id: vscode_version
    attributes:
      label: VS Code version
      placeholder: 1.120.x
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: macOS / Linux / Windows
    validations:
      required: true

  - type: dropdown
    id: command
    attributes:
      label: Affected command
      options:
        - sn: init
        - sn: auth
        - sn: auth validate
        - sn: pull
        - sn: pull by sys_id
        - sn: reset index
        - sn: push active
        - sn: push modified
        - sn: push report
        - Other / unknown
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / output
      description: Paste error messages, stack traces, or command output.
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, sample config (without secrets), related links.
