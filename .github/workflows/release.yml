name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package-and-release:
    name: Package VSIX and Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"

          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG) does not match package.json version ($PKG_VERSION)."
            exit 1
          fi

      - name: Compile
        run: npm run compile

      - name: Package extension (.vsix)
        run: npx @vscode/vsce package

      - name: Resolve VSIX path
        id: vsix
        run: |
          VSIX_FILE="$(ls -1 *.vsix | head -n 1)"
          if [ -z "$VSIX_FILE" ]; then
            echo "No .vsix file was produced."
            exit 1
          fi

          echo "path=$VSIX_FILE" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.vsix.outputs.path }}
          generate_release_notes: true
