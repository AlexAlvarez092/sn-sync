title: sn-sync
description: VS Code extension to sync ServiceNow script records to local files and push changes back safely.
remote_theme: just-the-docs/just-the-docs

url: "https://alexalvarez092.github.io"
baseurl: "/sn-sync"

plugins:
  - jekyll-remote-theme

# Theme settings
color_scheme: light
search_enabled: true
search:
  heading_level: 2
  previews: 3

aux_links:
  "View on GitHub":
    - "https://github.com/AlexAlvarez092/sn-sync"
aux_links_new_tab: true

nav_sort: order

back_to_top: true
back_to_top_text: "Back to top"

footer_content: "sn-sync is licensed under <a href=\"https://www.gnu.org/licenses/agpl-3.0.html\">GNU AGPL v3.0 or later</a>."

# Exclude non-docs files from Jekyll build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
